<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Slip</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Slip">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    /* Все стили сохранены, плюс новые для статуса */
    .chat-header { padding: 12px 16px; border-bottom: 0.5px solid #e5e5ea; display: flex; align-items: center; gap: 10px; background: #f9f9f9; cursor: pointer; flex-shrink: 0; }
    .chat-header .avatar { width: 36px; height: 36px; }
    .chat-header .user-info { flex: 1; }
    .chat-header .user-status { font-size: 12px; color: #8e8e93; margin-top: 2px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #c7c7cc; margin-left: 2px; }
    .status-dot.read { background: #007aff; }
    .status-dots { display: flex; gap: 2px; margin-left: 4px; }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <!-- Сайдбар, экраны входа/регистрации без изменений -->
  <div class="screen" id="mainScreen">
    <div id="tabContent"></div>
  </div>
</div>

<script>
  // Firebase, переменные, сжатие, сайдбар — всё как раньше

  function openChatScreen(chatId) {
    if (currentChatId) closeChatScreen();
    currentChatId = chatId;
    const container = $('#tabContent');
    container.classList.add('chat-open');
    container.innerHTML = `
      <div class="chat-screen" id="chatScreen">
        <div class="chat-header" id="chatHeader">
          <button class="ios-btn secondary" id="backToChats" style="width:auto; padding:8px 12px;">← Назад</button>
          <div class="avatar" id="chatPartnerAvatar" style="width:36px; height:36px;"></div>
          <div class="user-info">
            <strong id="chatPartnerName"></strong>
            <div class="user-status" id="chatPartnerStatus"></div>
          </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
          <button class="ios-btn secondary" id="attachMediaBtn" style="width:auto; padding:10px;">📎</button>
          <textarea class="chat-textarea" id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
          <button class="ios-btn" id="sendMsgBtn" style="width:auto; padding:10px 16px;">Отправить</button>
        </div>
      </div>
    `;
    document.getElementById('backToChats').addEventListener('click', () => {
      closeChatScreen();
      activateTab('chats');
    });

    loadChatInfo(chatId).then(partnerId => {
      currentPartnerId = partnerId;
      document.getElementById('chatHeader').addEventListener('click', () => {
        if (currentPartnerId) openUserProfile(currentPartnerId);
      });
    });

    listenMessages(chatId);
    markMessagesAsRead(chatId);

    const textarea = document.getElementById('messageInput');
    textarea.addEventListener('input', autoResize);
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage('text');
      }
    });
  }

  async function loadChatInfo(chatId) {
    const chatDoc = await db.collection('chats').doc(chatId).get();
    const chat = chatDoc.data();
    const otherId = chat.participants.find(id => id !== currentUser.id);
    const userDoc = await db.collection('users').doc(otherId).get();
    const userData = userDoc.data();
    document.getElementById('chatPartnerName').textContent = userData.name || 'Пользователь';
    document.getElementById('chatPartnerAvatar').style.backgroundImage = `url(${getMainPhoto(userData.photos)})`;

    const lastSeen = userData.lastSeen ? userData.lastSeen.toDate() : null;
    const statusEl = document.getElementById('chatPartnerStatus');
    if (lastSeen) {
      const now = new Date();
      const diffHours = (now - lastSeen) / (1000 * 60 * 60);
      const timeStr = lastSeen.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (diffHours < 24) {
        statusEl.textContent = `был(а) в сети в ${timeStr}`;
      } else {
        statusEl.textContent = `был(а) в сети ${lastSeen.toLocaleDateString()} в ${timeStr}`;
      }
    } else {
      statusEl.textContent = 'давно не заходил(а)';
    }
    return otherId;
  }

  function renderMessage(msg, container) {
    const isMy = msg.sender === currentUser.id;
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble ' + (isMy ? 'my-message' : 'their-message');
    bubble.dataset.messageId = msg.id;

    let content = '';
    if (msg.type === 'text') content += msg.text;
    else if (msg.type === 'image') content += `<img src="${msg.mediaUrl}" class="media-preview">`;
    else if (msg.type === 'video') content += `<video controls class="media-preview"><source src="${msg.mediaUrl}" type="video/mp4"></video>`;
    else if (msg.type === 'audio') content += `<audio controls src="${msg.mediaUrl}"></audio>`;
    if (msg.replyTo && msg.replyToText) content = `<div style="font-size:12px; opacity:0.7; border-left:2px solid #007aff; padding-left:6px; margin-bottom:4px;">↩ ${msg.replyToText}</div>` + content;

    let statusHTML = '';
    if (isMy) {
      if (msg.status === 'read') {
        statusHTML = '<div class="status-dots"><span class="status-dot read"></span><span class="status-dot read"></span></div>';
      } else if (msg.status === 'delivered') {
        statusHTML = '<div class="status-dots"><span class="status-dot"></span><span class="status-dot"></span></div>';
      } else {
        statusHTML = '<div class="status-dots"><span class="status-dot"></span></div>';
      }
    }

    bubble.innerHTML = content + `<div class="message-meta"><span>${new Date(msg.time?.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>${statusHTML}</div>`;
    if (msg.reactions?.length) {
      const rDiv = document.createElement('div'); rDiv.className = 'reactions';
      msg.reactions.forEach(r => { const s = document.createElement('span'); s.className = 'reaction'; s.textContent = r; rDiv.appendChild(s); });
      bubble.appendChild(rDiv);
    }

    let timer;
    bubble.addEventListener('touchstart', e => { timer = setTimeout(() => showContextMenu(e, msg, bubble), 500); });
    bubble.addEventListener('touchend', () => clearTimeout(timer));
    bubble.addEventListener('touchmove', () => clearTimeout(timer));
    container.appendChild(bubble);
    return bubble;
  }

  async function markMessagesAsRead(chatId) {
    const msgs = await db.collection('chats').doc(chatId).collection('messages')
      .where('sender', '!=', currentUser.id).where('status', '==', 'sent').get();
    const batch = db.batch();
    msgs.forEach(doc => batch.update(doc.ref, { status: 'read' }));
    await batch.commit();
    unreadCount -= msgs.size;
    if (unreadCount < 0) unreadCount = 0;
    updateUnreadBadge();
  }

  // Остальные функции (напоминания, задачи, профиль) полностью идентичны предыдущему коду.
  // Скопируйте их из последнего рабочего файла.
</script>
</body>
</html>
